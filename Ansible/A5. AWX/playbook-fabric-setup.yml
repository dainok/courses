#!/usr/bin/env ansible-playbook
- name: CONFIGURE FABRIC
  hosts: core,access
  gather_facts: false
  roles:
    - role: cisco_ios_system
      tags: dns,hostname
    - role: cisco_ios_ntp
      tags: ntp
    - role: cisco_ios_snmpv2
      tags: snmp
    - role: cisco_ios_vlan
      tags: vlan
    - role: cisco_ios_interface_profile
      tags: interface
  pre_tasks:
    # - name: SETTING BASTION HOST
    #   ansible.builtin.set_fact:
    #     ansible_ssh_common_args: >-
    #       -o ProxyCommand="ssh -o IdentityFile=/opt/bastionhost_id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p -q dev@172.25.82.110"
    - name: USING BATION HOST
      ansible.builtin.debug:
        msg: "Using bastion host ({{ ansible_ssh_common_args }})"
      when: ansible_ssh_common_args is defined
    - name: CHECKING SSH KEY
      delegate_to: localhost
      ansible.builtin.command:
        cmd: ls /opt
      register: output
    - debug:
        msg: "{{ output }}"

  post_tasks:
    - name: SAVING CONFIG
      tags: always
      cisco.ios.ios_config:
        save_when: modified
